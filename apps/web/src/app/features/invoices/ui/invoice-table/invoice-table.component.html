<table class="table">
  <thead>
    <tr>
      <th>Number</th>
      <th>Supplier</th>
      <th>Amount</th>
      <th>Date</th>
      <th>Status</th>
      <th>OCR</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    @for (invoice of invoices(); track invoice.id) {
      <tr>
        <td>{{ invoice.invoiceNumber }}</td>
        <td>{{ invoice.supplierName }}</td>
        <td>{{ invoice.amount }} {{ invoice.currency }}</td>
        <td>{{ invoice.invoiceDate | date: 'mediumDate' }}</td>
        <td>{{ invoice.status }}</td>
        <td>{{ invoice.ocrConfidence ?? '-' }}</td>
        <td class="actions">
          <button type="button" (click)="ocr.emit(invoice.id)">OCR</button>
          <button type="button" (click)="history.emit(invoice.id)">History</button>
        </td>
      </tr>
    }
  </tbody>
</table>
